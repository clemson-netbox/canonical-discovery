services:
  app:
    build:
      context: .
      target: runtime
    image: ${CANONICAL_DISCOVERY_APP_IMAGE:-ghcr.io/clemson-netbox/canonical-discovery}:${CANONICAL_DISCOVERY_IMAGE_TAG:-dev}
    working_dir: /workspace
    ports:
      - "8000:8000"
    environment:
      CANONICAL_DISCOVERY_DB_PATH: /var/lib/canonical-discovery/control-plane.db
    volumes:
      - app-data:/var/lib/canonical-discovery

  devcontainer:
    build:
      context: .
      target: dev
    image: ${CANONICAL_DISCOVERY_DEV_IMAGE:-canonical-discovery}:${CANONICAL_DISCOVERY_DEV_TAG:-dev}
    working_dir: /workspace
    command: ["sleep", "infinity"]
    tty: true
    stdin_open: true
    volumes:
      - .:/workspace
      - poetry-venvs:/opt/poetry-venvs

volumes:
  app-data:
  poetry-venvs:
